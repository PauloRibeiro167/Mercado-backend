default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>
    # Make host configurable to support local/dev environments and containerized setups
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: 5432
  primary_replica:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>
    host: <%= ENV.fetch("DB_REPL_HOST") { "localhost" } %>
    port: 5432
    replica: true
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>_cache
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>_queue
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>_cable
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>_test
    # Make host configurable to align with containerized environments
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: 5432
  primary_replica:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "mercado_backend_development" } %>_test
    host: <%= ENV.fetch("DB_REPL_HOST") { "localhost" } %>
    port: 5432
    replica: true

production:
  primary:
    <<: *default
    database: mercado_backend_production
    username: mercado_backend
    password: <%= ENV["MERCADO_BACKEND_DATABASE_PASSWORD"] %>
    # Host configurable to support different deployment topologies
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: 5432
  primary_replica:
    <<: *default
    database: mercado_backend_production
    username: mercado_backend
    password: <%= ENV["MERCADO_BACKEND_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DB_REPL_HOST") { "localhost" } %>
    port: 5432
    replica: true
  cache:
    <<: *default
    database: mercado_backend_production_cache
    username: mercado_backend
    password: <%= ENV["MERCADO_BACKEND_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  queue:
    <<: *default
    database: mercado_backend_production_queue
    username: mercado_backend
    password: <%= ENV["MERCADO_BACKEND_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  cable:
    <<: *default
    database: mercado_backend_production_cable
    username: mercado_backend
    password: <%= ENV["MERCADO_BACKEND_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
